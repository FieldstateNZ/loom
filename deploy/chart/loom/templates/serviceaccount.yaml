{{- if .Values.serviceAccount.create -}}
apiVersion: v1
kind: ServiceAccount
metadata:
  name: {{ include "loom.serviceAccountName" . }}
  labels:
    {{- include "loom.labels" . | nindent 4 }}
  {{- with .Values.serviceAccount.annotations }}
  annotations:
    {{- toYaml . | nindent 4 }}
  {{- end }}
# Loom talks only to PostgreSQL and the Anthropic API — it needs no Kubernetes
# API access, so the token is not auto-mounted.
automountServiceAccountToken: false
{{- end }}
