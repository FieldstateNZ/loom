{{- include "loom.requireExistingSecret" . -}}
apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "loom.fullname" . }}
  labels:
    {{- include "loom.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "loom.serverSelectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "loom.serverSelectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "loom.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds }}
      containers:
        - name: loom-server
          image: {{ include "loom.image" . | quote }}
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          ports:
            - name: http
              containerPort: {{ .Values.service.targetPort }}
              protocol: TCP
          env:
            # --- Non-secret configuration -----------------------------------
            - name: LOOM_BIND_ADDR
              value: {{ .Values.config.bindAddr | quote }}
            - name: LOOM_RUN_MIGRATIONS
              value: {{ .Values.config.runMigrations | quote }}
            {{- if .Values.config.batchPollIntervalSecs }}
            - name: LOOM_BATCH_POLL_INTERVAL_SECS
              value: {{ .Values.config.batchPollIntervalSecs | quote }}
            {{- end }}
            {{- if .Values.config.rustLog }}
            - name: RUST_LOG
              value: {{ .Values.config.rustLog | quote }}
            {{- end }}
            {{- if .Values.otel.enabled }}
            # --- OpenTelemetry ----------------------------------------------
            {{- if .Values.secrets.keys.otlpEndpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: {{ .Values.secrets.keys.otlpEndpoint | quote }}
            {{- else if .Values.otel.endpoint }}
            - name: OTEL_EXPORTER_OTLP_ENDPOINT
              value: {{ .Values.otel.endpoint | quote }}
            {{- end }}
            - name: OTEL_EXPORTER_OTLP_PROTOCOL
              value: {{ .Values.otel.protocol | quote }}
            - name: OTEL_SERVICE_NAME
              value: {{ .Values.otel.serviceName | quote }}
            {{- if .Values.otel.resourceAttributes }}
            - name: OTEL_RESOURCE_ATTRIBUTES
              value: {{ .Values.otel.resourceAttributes | quote }}
            {{- end }}
            - name: LOOM_TELEMETRY_CAPTURE_CONTENT
              value: {{ .Values.otel.captureContent | quote }}
            {{- end }}
            # --- Secrets (from an existing Secret; never templated) ----------
            {{- if .Values.postgresql.enabled }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ include "loom.postgresql.secretName" . | quote }}
                  key: DATABASE_URL
            {{- else }}
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: {{ .Values.secrets.keys.databaseUrl | quote }}
            {{- end }}
            - name: LOOM_ENCRYPTION_KEY
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: {{ .Values.secrets.keys.encryptionKey | quote }}
            - name: LOOM_ROOT_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: {{ .Values.secrets.keys.rootAdminToken | quote }}
            {{- if .Values.secrets.keys.keyPepper }}
            - name: LOOM_KEY_PEPPER
              valueFrom:
                secretKeyRef:
                  name: {{ .Values.secrets.existingSecret | quote }}
                  key: {{ .Values.secrets.keys.keyPepper | quote }}
            {{- end }}
            {{- with .Values.extraEnv }}
            # --- Extra env ---------------------------------------------------
            {{- toYaml . | nindent 12 }}
            {{- end }}
          livenessProbe:
            httpGet:
              path: {{ .Values.probes.liveness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.liveness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.liveness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.liveness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.liveness.failureThreshold }}
          readinessProbe:
            httpGet:
              path: {{ .Values.probes.readiness.path }}
              port: http
            initialDelaySeconds: {{ .Values.probes.readiness.initialDelaySeconds }}
            periodSeconds: {{ .Values.probes.readiness.periodSeconds }}
            timeoutSeconds: {{ .Values.probes.readiness.timeoutSeconds }}
            failureThreshold: {{ .Values.probes.readiness.failureThreshold }}
          {{- if .Values.probes.startup.enabled }}
          startupProbe:
            httpGet:
              path: {{ .Values.probes.startup.path }}
              port: http
            periodSeconds: {{ .Values.probes.startup.periodSeconds }}
            failureThreshold: {{ .Values.probes.startup.failureThreshold }}
          {{- end }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
          volumeMounts:
            # Read-only root filesystem: give the process a writable /tmp.
            - name: tmp
              mountPath: /tmp
      volumes:
        - name: tmp
          emptyDir: {}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.topologySpreadConstraints }}
      topologySpreadConstraints:
        {{- toYaml . | nindent 8 }}
      {{- end }}
